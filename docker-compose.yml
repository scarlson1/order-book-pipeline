services:
  # TimescaleDB for time-series storage
  # timescaledb:
  #   image: timescale/timescaledb:latest-pg15
  #   container_name: orderbook_timescaledb
  #   environment:
  #     POSTGRES_DB: orderbook
  #     POSTGRES_USER: orderbook_user
  #     POSTGRES_PASSWORD: orderbook_pass
  #     POSTGRES_HOST_AUTH_METHOD: trust
  #   ports:
  #     - '5432:5432'
  #   extra_hosts:
  #     - 'host.docker.internal:127.0.0.1' #// Linux
  #     - 'host.docker.internal:host-gateway' #// Access services on the host machine from within the Docker container
  #   volumes:
  #     - timescale_data:/var/lib/postgresql/data
  #     - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
  #   healthcheck:
  #     test: ['CMD-SHELL', 'pg_isready -U orderbook_user -d orderbook']
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - orderbook_network

  cockroachdb:
    image: cockroachdb/cockroach:latest-v25.2
    container_name: orderbook_cockroachdb
    # command: start-single-node --insecure --listen-addr=localhost:26257 --sql-addr=0.0.0.0:26257 --http-addr=0.0.0.0:8080 --advertise-addr=cockroachdb --accept-sql-without-tls
    command: start-single-node --insecure --listen-addr=localhost:26257 --sql-addr=0.0.0.0:26258 --http-addr=0.0.0.0:8080 --advertise-addr=cockroachdb:26258 --accept-sql-without-tls
    ports:
      - '26258:26258'
      - '8088:8080'
    env_file:
      - .env
    environment:
      COCKROACH_DATABASE: ${POSTGRES_DB}
      COCKROACH_USER: ${POSTGRES_USER}
      COCKROACH_PASSWORD: ${POSTGRES_PASSWORD}
    # ports:
    #   - '26257:26257' # connection port
    #   - '8088:8080' # CockroachDB Admin UI (avoid conflict with Redpanda Console on :8080)
    extra_hosts:
      - 'host.docker.internal:127.0.0.1' #// Linux
      - 'host.docker.internal:host-gateway' #// Access services on the host machine from within the Docker container
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "cockroach sql --insecure --host=localhost:26258 -e 'SELECT 1' >/dev/null 2>&1 || exit 1",
        ]
      #     "cockroach sql --insecure --host=localhost:26257 -e 'SELECT 1' >/dev/null 2>&1 || exit 1",
      interval: 10s
      timeout: 5s
      retries: 5
    # networks:
    #   - orderbook_network
    networks:
      orderbook_network:
        aliases:
          - cockroachdb

  db-migrate:
    image: amacneil/dbmate:2
    container_name: orderbook_db_migrate
    depends_on:
      cockroachdb:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./db/migrations:/db/migrations:ro
    command:
      - '--migrations-dir'
      - '/db/migrations'
      - '--url'
      - 'postgres://${POSTGRES_USER}@cockroachdb:26258/${POSTGRES_DB}?sslmode=disable'
      - 'up'
    #     'postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cockroachdb:26257/${POSTGRES_DB}?sslmode=disable',
    restart: 'no'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - orderbook_network

  # Redis for caching and real-time state
  redis:
    image: redis:7-alpine
    container_name: orderbook_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - orderbook_network

  # Redpanda (optional - Kafka-compatible streaming platform)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.3
    container_name: orderbook_redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=info
    ports:
      - '18081:18081' # Schema Registry
      - '18082:18082' # Pandaproxy (REST API)
      - '19092:19092' # Kafka API
      - '19644:9644' # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - orderbook_network
    healthcheck:
      test:
        ['CMD-SHELL', "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  # run once on start up to create topics (one partition per symbol)
  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.3
    container_name: orderbook_redpanda_init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: |
      /bin/bash -c "
      echo 'Creating Redpanda topics...'

      rpk topic create orderbook.raw --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=3600000 --topic-config cleanup.policy=delete

      rpk topic create orderbook.metrics --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=3600000 --topic-config cleanup.policy=delete

      rpk topic create orderbook.metrics.windowed --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=3600000 --topic-config cleanup.policy=delete

      rpk topic create orderbook.alerts --brokers redpanda:9092 --partitions 1 --replicas 1 --topic-config retention.ms=86400000 --topic-config cleanup.policy=delete

      echo 'Topics created:'
      rpk topic list --brokers redpanda:9092
      "
    networks:
      - orderbook_network
    restart: 'no' # Run once and exit

  # Redpanda Console (optional - Web UI for Redpanda)
  redpanda-console:
    image: redpandadata/console:latest
    container_name: orderbook_redpanda_console
    depends_on:
      - redpanda
    ports:
      - '8080:8080'
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: 'true'
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    networks:
      - orderbook_network

  # Data ingestion service
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: orderbook_ingestion
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: cockroachdb
      POSTGRES_PORT: ${POSTGRES_PORT:-26258} # 26257
      POSTGRES_SSLMODE: disable
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - orderbook_network

  # Add this service after the ingestion service
  consumers:
    build:
      context: .
      dockerfile: Dockerfile.consumers
    container_name: orderbook_consumers
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      POSTGRES_HOST: cockroachdb
      POSTGRES_PORT: ${POSTGRES_PORT:-26258} # 26257
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: disable
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDPANDA_BOOTSTRAP_SERVERS: ${REDPANDA_BOOTSTRAP_SERVERS:-redpanda:9092}
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - orderbook_network

  # Apache Flink JobManager - stream processing coordinator
  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    # image: flink:1.18-scala_2.12
    image: orderbook-flink:latest
    container_name: orderbook_flink_jobmanager
    pull_policy: never
    # platform: 'linux/amd64'
    hostname: flink-jobmanager
    command: jobmanager
    expose:
      - '6123'
    ports:
      # - '8081:8081' # Flink Web UI
      - '18091:8081'
    extra_hosts:
      - 'host.docker.internal:127.0.0.1' #// Linux
      - 'host.docker.internal:host-gateway' #// Access services on the host machine from within the Docker container
    env_file:
      - .env
    environment:
      - POSTGRES_URL=${POSTGRES_URL:-jdbc:postgresql://host.docker.internal:5432/postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - PYTHONPATH=/opt:/opt/src
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.bind-host: 0.0.0.0
        rest.port: 8081
        rest.bind-address: 0.0.0.0
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        jobmanager.memory.process.size: 1600m
        jobmanager.memory.jvm-metaspace.size: 256m
        env.java.opts.all: -XX:MaxMetaspaceSize=256m
        taskmanager.memory.managed.fraction: 0.4
        state.backend.type: rocksdb
        state.backend.incremental: true
        state.backend.rocksdb.checkpoint.transfer.thread.num: 2
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.backend.rocksdb.memory.managed: true
        heartbeat.interval: 10000
        heartbeat.timeout: 50000
        taskmanager.registration.timeout: 5 min
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - ./src/:/opt/src
      - ./:/opt/flink/usrlib
      # - ./src/jobs:/opt/flink/jobs # Mount your Flink jobs
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - orderbook_network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8081/overview || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Apache Flink TaskManager - stream processing worker
  flink-taskmanager:
    # image: flink:1.18-scala_2.12
    image: orderbook-flink:latest # use image build above in flink-jobmanager
    container_name: orderbook_flink_taskmanager
    pull_policy: never
    # platform: 'linux/amd64'
    command: taskmanager
    expose:
      - '6121'
      - '6122'
    extra_hosts:
      - 'host.docker.internal:127.0.0.1' #// Linux
      - 'host.docker.internal:host-gateway' #// Access services on the host machine from within the Docker container
    env_file:
      - .env
    environment:
      - PYTHONPATH=/opt:/opt/src
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.host: flink-taskmanager
        taskmanager.bind-host: 0.0.0.0
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        taskmanager.memory.process.size: 2048m
        taskmanager.memory.jvm-metaspace.size: 256m
        env.java.opts.taskmanager: -XX:MaxMetaspaceSize=256m
        taskmanager.memory.managed.fraction: 0.4
        state.backend.type: rocksdb
        state.backend.incremental: true
        state.backend.rocksdb.checkpoint.transfer.thread.num: 2
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.backend.rocksdb.memory.managed: true
        state.backend.rocksdb.writebuffer.size: 67108864
        state.backend.rocksdb.writebuffer.count: 2
        heartbeat.interval: 10000
        heartbeat.timeout: 50000
        taskmanager.registration.timeout: 5 min
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - ./src/:/opt/src
    depends_on:
      - flink-jobmanager
    networks:
      - orderbook_network

  # Flink Job Submitter - automatically submits jobs on startup
  flink-job-submitter:
    image: orderbook-flink:latest
    container_name: orderbook_flink_job_submitter
    # platform: 'linux/amd64'
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
    volumes:
      - ./src:/opt/src
    env_file:
      - .env
    environment:
      - FLINK_JOBMANAGER_HOST=flink-jobmanager
      - PYTHONPATH=/opt:/opt/src
    entrypoint: |
      bash -c '
        set -e
        echo "Waiting for Flink JobManager to be ready..."
        until /opt/flink/bin/flink list -m flink-jobmanager:8081 >/dev/null 2>&1; do
          sleep 2
        done
        echo "Waiting for at least one TaskManager..."
        until curl -sf http://flink-jobmanager:8081/taskmanagers | grep -q "\"id\""; do
          sleep 2
        done
        echo "JobManager ready! Checking for existing jobs..."

        curl -sf http://flink-jobmanager:8081/jobs/overview | python3 -c "import sys,json; jobs=json.load(sys.stdin).get(\"jobs\",[]); exit(0 if any(j[\"name\"]==\"OrderBook Metrics Processor\" and j[\"state\"] in (\"RUNNING\",\"CREATED\") for j in jobs) else 1)" \
          && echo "Skipping OrderBook Metrics Processor -- already running" \
          || /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_metrics.py --pyFiles /opt/src -d

        curl -sf http://flink-jobmanager:8081/jobs/overview | python3 -c "import sys,json; jobs=json.load(sys.stdin).get(\"jobs\",[]); exit(0 if any(j[\"name\"]==\"OrderBook Alerts Processor\" and j[\"state\"] in (\"RUNNING\",\"CREATED\") for j in jobs) else 1)" \
          && echo "Skipping OrderBook Alerts Processor -- already running" \
          || /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_alerts.py --pyFiles /opt/src -d

        curl -sf http://flink-jobmanager:8081/jobs/overview | python3 -c "import sys,json; jobs=json.load(sys.stdin).get(\"jobs\",[]); exit(0 if any(j[\"name\"]==\"OrderBook Window Aggregate Processor\" and j[\"state\"] in (\"RUNNING\",\"CREATED\") for j in jobs) else 1)" \
          && echo "Skipping OrderBook Window Aggregate Processor -- already running" \
          || /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_windows.py --pyFiles /opt/src -d

        echo "Done!"
      '
    # entrypoint: >
    #   bash -lc '
    #     set -e
    #     echo "Waiting for Flink JobManager to be ready..."
    #     until /opt/flink/bin/flink list -m flink-jobmanager:8081 >/dev/null 2>&1; do
    #       sleep 2
    #     done
    #     echo "Waiting for at least one TaskManager..."
    #     until curl -sf http://flink-jobmanager:8081/taskmanagers | grep -q "\"id\""; do
    #       sleep 2
    #     done
    #     echo "JobManager ready! Submitting jobs..."
    #     /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_metrics.py --pyFiles /opt/src -d
    #     /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_alerts.py --pyFiles /opt/src -d
    #     /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_windows.py --pyFiles /opt/src -d
    #     echo "All jobs submitted!"
    #     exit 0
    #   '
    restart: 'no'
    networks:
      - orderbook_network
    profiles:
      - auto-submit

  # Streamlit dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: orderbook_dashboard
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - '8501:8501'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    env_file:
      - .env
    environment:
      POSTGRES_HOST: cockroachdb
      POSTGRES_PORT: ${POSTGRES_PORT:-26258} # 26257
      POSTGRES_SSLMODE: disable
    # environment:
    #   POSTGRES_HOST: timescaledb
    #   POSTGRES_PORT: 5432
    #   POSTGRES_DB: orderbook
    #   POSTGRES_USER: orderbook_user
    #   POSTGRES_PASSWORD: orderbook_pass
    #   REDIS_HOST: redis
    #   REDIS_PORT: 6379
    #   # Redpanda and Flink health check endpoints (Docker network)
    #   REDPANDA_ADMIN_URL: http://redpanda:19644
    #   REDPANDA_KAFKA_PORT: 19092
    #   FLINK_UI_URL: http://flink-jobmanager:8081
    volumes:
      - ./dashboard:/app/dashboard
      - ./src:/app/src
    restart: unless-stopped
    networks:
      - orderbook_network
    # profiles:
    #   - with-streamlit

  # Grafana (optional - for advanced visualization)
  grafana:
    image: grafana/grafana:10.2.0
    container_name: orderbook_grafana
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - orderbook_network
    profiles:
      - with-grafana

  # or use DataGrip (localhost for the host, not timescaledb)
  # pgAdmin (optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orderbook_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orderbook.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - orderbook_network
    profiles:
      - with-pgadmin

networks:
  orderbook_network:
    driver: bridge

volumes:
  # timescale_data:
  cockroach_data:
  redis_data:
  redpanda_data:
  flink_checkpoints:
  grafana_data:
  pgadmin_data:
