name: Infra Apply

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_VAR_oci_tenancy_ocid: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
      TF_VAR_oci_user_ocid: ${{ secrets.TF_VAR_OCI_USER_OCID }}
      TF_VAR_oci_fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
      TF_VAR_oci_region: ${{ secrets.TF_VAR_OCI_REGION }}
      TF_VAR_oci_compartment_ocid: ${{ secrets.TF_VAR_OCI_COMPARTMENT_OCID }}
      TF_VAR_oci_admin_cidr: ${{ secrets.TF_VAR_OCI_ADMIN_CIDR }}
      TF_VAR_oci_ssh_public_key: ${{ secrets.TF_VAR_OCI_SSH_PUBLIC_KEY }}
      TF_VAR_cockroach_api_key: ${{ secrets.TF_VAR_COCKROACH_API_KEY }}
      TF_VAR_upstash_email: ${{ secrets.TF_VAR_UPSTASH_EMAIL }}
      TF_VAR_upstash_api_key: ${{ secrets.TF_VAR_UPSTASH_API_KEY }}
      TF_VAR_redpanda_client_id: ${{ secrets.TF_VAR_REDPANDA_CLIENT_ID }}
      TF_VAR_redpanda_client_secret: ${{ secrets.TF_VAR_REDPANDA_CLIENT_SECRET }}
      TF_VAR_redpanda_kafka_password: ${{ secrets.TF_VAR_REDPANDA_KAFKA_PASSWORD }}
    defaults:
      run:
        working-directory: terraform/envs/prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Write OCI API Private Key
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/oci_api_key.pem"
          printf '%s' '${{ secrets.OCI_API_PRIVATE_KEY_PEM }}' > "$key_path"
          chmod 600 "$key_path"
          echo "TF_VAR_oci_private_key_path=$key_path" >> "$GITHUB_ENV"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform Outputs
        run: terraform output -json > tf-output.json

      - name: Upload Terraform Outputs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-prod
          path: terraform/envs/prod/tf-output.json

      - name: Sync Runtime Variables from Terraform Outputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          set_variable() {
            variable_name="$1"
            variable_value="$2"

            if [ -z "$variable_value" ]; then
              echo "Skipping empty variable ${variable_name}"
              return 0
            fi

            if gh api "/repos/${GITHUB_REPOSITORY}/actions/variables/${variable_name}" >/dev/null 2>&1; then
              gh api \
                --method PATCH \
                "/repos/${GITHUB_REPOSITORY}/actions/variables/${variable_name}" \
                -f name="${variable_name}" \
                -f value="${variable_value}" >/dev/null
              echo "Updated ${variable_name}"
            else
              gh api \
                --method POST \
                "/repos/${GITHUB_REPOSITORY}/actions/variables" \
                -f name="${variable_name}" \
                -f value="${variable_value}" >/dev/null
              echo "Created ${variable_name}"
            fi
          }

          set_variable "OCI_VM_HOST" "$(terraform output -raw oci_vm_public_ip)"
          set_variable "POSTGRES_PORT" "$(terraform output -raw cockroach_sql_port)"
          set_variable "POSTGRES_DB" "$(terraform output -raw cockroach_default_database)"
          set_variable "POSTGRES_SSLMODE" "$(terraform output -raw cockroach_default_sslmode)"
          set_variable "REDIS_HOST" "$(terraform output -raw upstash_redis_endpoint)"
          set_variable "REDIS_PORT" "$(terraform output -raw upstash_redis_port)"
          set_variable "REDIS_SSL" "$(terraform output -raw upstash_redis_tls)"
          set_variable "REDPANDA_USERNAME" "$(terraform output -raw redpanda_kafka_username)"
          set_variable "REDPANDA_TOPIC_PREFIX" "$(terraform output -raw redpanda_topic_prefix)"
          set_variable "REDPANDA_SECURITY_PROTOCOL" "$(terraform output -raw redpanda_security_protocol)"
          set_variable "REDPANDA_SASL_MECHANISM" "$(terraform output -raw redpanda_sasl_mechanism)"
          set_variable "REDPANDA_SSL_CHECK_HOSTNAME" "$(terraform output -raw redpanda_ssl_check_hostname)"
          set_variable "REDPANDA_KAFKA_PORT" "$(terraform output -raw redpanda_kafka_port)"
