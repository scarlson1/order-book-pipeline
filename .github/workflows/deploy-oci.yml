name: Deploy OCI Runtime

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'db/migrations/**'
      - 'compose.oci.yml'
      - '.env.oci.example'
      - 'Dockerfile.ingestion'
      - 'Dockerfile.consumers'
      - 'Dockerfile.flink'
      - '.github/workflows/deploy-oci.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT || secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE || secrets.POSTGRES_SSLMODE }}
          REDIS_HOST: ${{ vars.REDIS_HOST || secrets.REDIS_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT || secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_SSL: ${{ vars.REDIS_SSL || secrets.REDIS_SSL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDPANDA_BOOTSTRAP_SERVERS: ${{ secrets.REDPANDA_BOOTSTRAP_SERVERS }}
          REDPANDA_SERVICE: ${{ secrets.REDPANDA_SERVICE }}
          REDPANDA_ADMIN_URL: ${{ vars.REDPANDA_ADMIN_URL || secrets.REDPANDA_ADMIN_URL }}
          REDPANDA_TOPIC_PREFIX: ${{ vars.REDPANDA_TOPIC_PREFIX || secrets.REDPANDA_TOPIC_PREFIX }}
          REDPANDA_SECURITY_PROTOCOL: ${{ vars.REDPANDA_SECURITY_PROTOCOL || secrets.REDPANDA_SECURITY_PROTOCOL }}
          REDPANDA_SASL_MECHANISM: ${{ vars.REDPANDA_SASL_MECHANISM || secrets.REDPANDA_SASL_MECHANISM }}
          REDPANDA_USERNAME: ${{ vars.REDPANDA_USERNAME || secrets.REDPANDA_USERNAME }}
          REDPANDA_PASSWORD: ${{ secrets.REDPANDA_PASSWORD }}
          REDPANDA_SSL_CHECK_HOSTNAME: ${{ vars.REDPANDA_SSL_CHECK_HOSTNAME || secrets.REDPANDA_SSL_CHECK_HOSTNAME }}
          REDPANDA_BOOTSTRAP_PORT: ${{ vars.REDPANDA_BOOTSTRAP_PORT || secrets.REDPANDA_BOOTSTRAP_PORT }}
          REDPANDA_KAFKA_PORT: ${{ vars.REDPANDA_KAFKA_PORT || secrets.REDPANDA_KAFKA_PORT }}
          FLINK_HOST: ${{ secrets.FLINK_HOST }}
          FLINK_PARALLELISM: ${{ secrets.FLINK_PARALLELISM }}
          FLINK_PORT: ${{ secrets.FLINK_PORT }}
          BINANCE_WS_URL: ${{ secrets.BINANCE_WS_URL }}
          SYMBOLS: ${{ secrets.SYMBOLS }}
          DEPTH_LEVELS: ${{ secrets.DEPTH_LEVELS }}
          UPDATE_SPEED: ${{ secrets.UPDATE_SPEED }}
          CALCULATE_DEPTH: ${{ secrets.CALCULATE_DEPTH }}
          ROLLING_WINDOW_SECONDS: ${{ secrets.ROLLING_WINDOW_SECONDS }}
          CALCULATE_VELOCITY: ${{ secrets.CALCULATE_VELOCITY }}
          ALERT_THRESHOLD_HIGH: ${{ secrets.ALERT_THRESHOLD_HIGH }}
          ALERT_THRESHOLD_MEDIUM: ${{ secrets.ALERT_THRESHOLD_MEDIUM }}
          SPREAD_ALERT_MULTIPLIER: ${{ secrets.SPREAD_ALERT_MULTIPLIER }}
          VELOCITY_THRESHOLD: ${{ secrets.VELOCITY_THRESHOLD }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          LOG_FILE: ${{ secrets.LOG_FILE }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          OCI_VM_PUBLIC_IP: ${{ vars.OCI_VM_HOST }}
        with:
          host: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          envs: DATABASE_URL,POSTGRES_HOST,POSTGRES_PORT,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_SSLMODE,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,REDIS_SSL,REDIS_URL,REDPANDA_BOOTSTRAP_SERVERS,REDPANDA_ADMIN_URL,REDPANDA_SERVICE,REDPANDA_BOOTSTRAP_PORT,REDPANDA_TOPIC_PREFIX,REDPANDA_SECURITY_PROTOCOL,REDPANDA_SASL_MECHANISM,REDPANDA_USERNAME,REDPANDA_PASSWORD,REDPANDA_SSL_CHECK_HOSTNAME,REDPANDA_KAFKA_PORT,FLINK_HOST,FLINK_PARALLELISM,FLINK_PORT,BINANCE_WS_URL,SYMBOLS,DEPTH_LEVELS,UPDATE_SPEED,CALCULATE_DEPTH,ROLLING_WINDOW_SECONDS,CALCULATE_VELOCITY,ALERT_THRESHOLD_HIGH,ALERT_THRESHOLD_MEDIUM,SPREAD_ALERT_MULTIPLIER,VELOCITY_THRESHOLD,LOG_LEVEL,LOG_FILE,ENVIRONMENT,OCI_VM_PUBLIC_IP
          script: |
            set -e
            cd /opt/order-book-pipeline
            git fetch --all
            git checkout main
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Stashing local changes before deploy pull"
              git stash push --include-untracked --message "auto-deploy-$(date -u +%Y%m%dT%H%M%SZ)"
            fi
            git pull --ff-only

            required_vars='DATABASE_URL POSTGRES_HOST POSTGRES_PORT POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD POSTGRES_SSLMODE REDIS_HOST REDIS_PORT REDIS_SSL REDPANDA_BOOTSTRAP_SERVERS REDPANDA_BOOTSTRAP_PORT REDPANDA_ADMIN_URL REDPANDA_TOPIC_PREFIX REDPANDA_SECURITY_PROTOCOL REDPANDA_SSL_CHECK_HOSTNAME REDPANDA_KAFKA_PORT FLINK_HOST FLINK_PARALLELISM FLINK_PORT BINANCE_WS_URL SYMBOLS DEPTH_LEVELS UPDATE_SPEED CALCULATE_DEPTH ROLLING_WINDOW_SECONDS CALCULATE_VELOCITY ALERT_THRESHOLD_HIGH ALERT_THRESHOLD_MEDIUM SPREAD_ALERT_MULTIPLIER VELOCITY_THRESHOLD LOG_LEVEL LOG_FILE ENVIRONMENT'
            for var_name in $required_vars; do
              if [ -z "$(printenv "$var_name")" ]; then
                echo "Missing required deploy secret: $var_name"
                exit 1
              fi
            done

            umask 077
            cat > .env.oci <<EOF
            DATABASE_URL=${DATABASE_URL}
            POSTGRES_HOST=${POSTGRES_HOST}
            POSTGRES_PORT=${POSTGRES_PORT}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_SSLMODE=${POSTGRES_SSLMODE}
            REDIS_HOST=${REDIS_HOST}
            REDIS_PORT=${REDIS_PORT}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            REDIS_SSL=${REDIS_SSL}
            REDIS_URL=${REDIS_URL}
            REDPANDA_BOOTSTRAP_SERVERS=${REDPANDA_BOOTSTRAP_SERVERS}
            REDPANDA_ADMIN_URL=${REDPANDA_ADMIN_URL}
            REDPANDA_SERVICE=${REDPANDA_SERVICE}
            REDPANDA_TOPIC_PREFIX=${REDPANDA_TOPIC_PREFIX}
            REDPANDA_SECURITY_PROTOCOL=${REDPANDA_SECURITY_PROTOCOL}
            REDPANDA_SASL_MECHANISM=${REDPANDA_SASL_MECHANISM}
            REDPANDA_USERNAME=${REDPANDA_USERNAME}
            REDPANDA_PASSWORD=${REDPANDA_PASSWORD}
            REDPANDA_SSL_CHECK_HOSTNAME=${REDPANDA_SSL_CHECK_HOSTNAME}
            REDPANDA_KAFKA_PORT=${REDPANDA_KAFKA_PORT}
            FLINK_HOST=${FLINK_HOST}
            FLINK_PARALLELISM=${FLINK_PARALLELISM}
            FLINK_PORT=${FLINK_PORT}
            BINANCE_WS_URL=${BINANCE_WS_URL}
            SYMBOLS=${SYMBOLS}
            DEPTH_LEVELS=${DEPTH_LEVELS}
            UPDATE_SPEED=${UPDATE_SPEED}
            CALCULATE_DEPTH=${CALCULATE_DEPTH}
            ROLLING_WINDOW_SECONDS=${ROLLING_WINDOW_SECONDS}
            CALCULATE_VELOCITY=${CALCULATE_VELOCITY}
            ALERT_THRESHOLD_HIGH=${ALERT_THRESHOLD_HIGH}
            ALERT_THRESHOLD_MEDIUM=${ALERT_THRESHOLD_MEDIUM}
            SPREAD_ALERT_MULTIPLIER=${SPREAD_ALERT_MULTIPLIER}
            VELOCITY_THRESHOLD=${VELOCITY_THRESHOLD}
            LOG_LEVEL=${LOG_LEVEL}
            LOG_FILE=${LOG_FILE}
            ENVIRONMENT=${ENVIRONMENT}
            OCI_VM_PUBLIC_IP=${OCI_VM_PUBLIC_IP}
            EOF

            docker compose -f compose.oci.yml --env-file .env.oci run --rm db-migrate
            docker compose -f compose.oci.yml --env-file .env.oci up -d redpanda
            docker compose -f compose.oci.yml --env-file .env.oci run --rm redpanda-init
            docker compose -f compose.oci.yml --env-file .env.oci up -d redpanda-console
            docker compose -f compose.oci.yml --env-file .env.oci up -d --build ingestion consumers
            docker compose -f compose.oci.yml --env-file .env.oci up -d --build --force-recreate flink-jobmanager flink-taskmanager
            docker compose -f compose.oci.yml --env-file .env.oci run --rm flink-job-submitter
            docker image prune -f
