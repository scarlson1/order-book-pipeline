services:
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    env_file:
      - .env.oci
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  db-migrate:
    image: amacneil/dbmate:2
    env_file:
      - .env.oci
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./db/migrations:/db/migrations:ro
    command: ['--migrations-dir', '/db/migrations', 'up']
    restart: 'no'
    # profiles:
    #   - migrate

  consumers:
    build:
      context: .
      dockerfile: Dockerfile.consumers
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    env_file:
      - .env.oci
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    image: orderbook-flink:latest
    command: jobmanager
    env_file:
      - .env.oci
    environment:
      - PYTHONPATH=/opt:/opt/src
      - REDPANDA_BOOTSTRAP_PORT=9092
      - REDPANDA_ADMIN_URL=http://redpanda:9644
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081
        rest.bind-address: 0.0.0.0
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        jobmanager.memory.process.size: 1600m
        state.backend.type: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - ./src:/opt/src
      - .:/opt/flink/usrlib
    ports:
      - '8081:8081'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8081/overview || exit 1']
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  flink-taskmanager:
    image: orderbook-flink:latest
    command: taskmanager
    env_file:
      - .env.oci
    environment:
      - PYTHONPATH=/opt:/opt/src
      - REDPANDA_BOOTSTRAP_PORT=9092
      - REDPANDA_ADMIN_URL=http://redpanda:9644
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
        state.backend.type: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - ./src:/opt/src
    depends_on:
      - flink-jobmanager
    restart: unless-stopped

  flink-job-submitter:
    image: orderbook-flink:latest
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    env_file:
      - .env.oci
    volumes:
      - ./src:/opt/src
    entrypoint: |
      bash -c '
        set -e
        echo "Waiting for Flink JobManager to be ready..."
        until /opt/flink/bin/flink list -m flink-jobmanager:8081 >/dev/null 2>&1; do
          sleep 2
        done
        echo "Waiting for at least one TaskManager..."
        until curl -sf http://flink-jobmanager:8081/taskmanagers | grep -q "\"id\""; do
          sleep 2
        done
        echo "JobManager ready! Checking for existing jobs..."

        curl -sf http://flink-jobmanager:8081/jobs/overview | python3 -c "import sys,json; jobs=json.load(sys.stdin).get(\"jobs\",[]); exit(0 if any(j[\"name\"]==\"OrderBook Metrics Processor\" and j[\"state\"] in (\"RUNNING\",\"CREATED\") for j in jobs) else 1)" \
          && echo "Skipping OrderBook Metrics Processor -- already running" \
          || /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_metrics.py --pyFiles /opt/src -d

        curl -sf http://flink-jobmanager:8081/jobs/overview | python3 -c "import sys,json; jobs=json.load(sys.stdin).get(\"jobs\",[]); exit(0 if any(j[\"name\"]==\"OrderBook Alerts Processor\" and j[\"state\"] in (\"RUNNING\",\"CREATED\") for j in jobs) else 1)" \
          && echo "Skipping OrderBook Alerts Processor -- already running" \
          || /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_alerts.py --pyFiles /opt/src -d

        curl -sf http://flink-jobmanager:8081/jobs/overview | python3 -c "import sys,json; jobs=json.load(sys.stdin).get(\"jobs\",[]); exit(0 if any(j[\"name\"]==\"OrderBook Window Aggregate Processor\" and j[\"state\"] in (\"RUNNING\",\"CREATED\") for j in jobs) else 1)" \
          && echo "Skipping OrderBook Window Aggregate Processor -- already running" \
          || /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_windows.py --pyFiles /opt/src -d

        echo "Done!"
      '
    # entrypoint: >
    #   bash -lc '
    #     set -e
    #     until /opt/flink/bin/flink list -m flink-jobmanager:8081 >/dev/null 2>&1; do sleep 2; done
    #     /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_metrics.py --pyFiles /opt/src -d
    #     /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_alerts.py --pyFiles /opt/src -d
    #     /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/src/jobs/orderbook_windows.py --pyFiles /opt/src -d
    #   '
    restart: 'no'

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:9093
      - --advertise-kafka-addr=internal://redpanda:9092,external://${OCI_VM_PUBLIC_IP}:9093
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --schema-registry-addr=0.0.0.0:8083
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - '9093:9093' # Kafka API  – for streamlit health checks
      - '9644:9644' # Admin API  – for streamlit health checks
      - '8082:8082' # HTTP Proxy – internal only
      - '8083:8083' # Schema Registry – internal only
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD-SHELL', "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redpanda Console ────────────────────────────────────────────────────────
  # Accessible at http://<VM_PUBLIC_IP>:8080
  # Protect with an OCI security-list rule that restricts to your IP.
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml && /app/console'
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8083"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - '8080:8080' # Restrict in OCI security list to your IP only

  # ── Topic initialization ────────────────────────────────────────────────────
  # Runs once on first deploy (or re-deploy). Idempotent: --if-not-exists
  # prevents errors if topics already exist.
  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    restart: 'no'
    entrypoint: ['/bin/bash', '-c']
    command:
      - |
        set -e
        echo "Configuring cluster..."
        rpk cluster config set log_retention_ms 86400000 -X 'admin.hosts=redpanda:9644'
        rpk cluster config set log_segment_size 134217728 -X 'admin.hosts=redpanda:9644'

        echo "Creating topics..."

        rpk topic create ${REDPANDA_TOPIC_PREFIX}.raw \
          -X 'brokers=redpanda:9092' \
          --partitions 3 \
          --replicas 1 \
          --if-not-exists \
          -c retention.ms=3600000 \
          -c cleanup.policy=delete

        rpk topic create ${REDPANDA_TOPIC_PREFIX}.metrics \
          -X 'brokers=redpanda:9092' \
          --partitions 3 \
          --replicas 1 \
          --if-not-exists \
          -c retention.ms=3600000 \
          -c cleanup.policy=delete

        rpk topic create ${REDPANDA_TOPIC_PREFIX}.metrics.windowed \
          -X 'brokers=redpanda:9092' \
          --partitions 3 \
          --replicas 1 \
          --if-not-exists \
          -c retention.ms=7200000 \
          -c cleanup.policy=delete

        rpk topic create ${REDPANDA_TOPIC_PREFIX}.alerts \
          -X 'brokers=redpanda:9092' \
          --partitions 1 \
          --replicas 1 \
          --if-not-exists \
          -c retention.ms=86400000 \
          -c cleanup.policy=delete

        echo "Topics ready:"
        rpk topic list -X 'brokers=redpanda:9092'
    environment:
      REDPANDA_TOPIC_PREFIX: ${REDPANDA_TOPIC_PREFIX:-orderbook}

volumes:
  flink_checkpoints:
  redpanda_data:
    driver: local
